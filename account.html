<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Lumina | My Account</title>
    <meta content="Your Lumina account." name="description" />
    <link href="assets/img/lumina-logo.png?v=2" rel="icon" type="image/png" />
    <script>document.documentElement.classList.add('js');</script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;1,400&family=Hanken+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; }
    </style>
    <link href="assets/css/tailwind.css" rel="stylesheet" />
    <link href="assets/css/site.css" rel="stylesheet" />
    <script defer src="assets/js/main.js"></script>
    <script defer src="assets/js/auth.js"></script>
</head>
<body class="bg-background text-on-surface font-body-md antialiased flex flex-col min-h-screen" data-require-auth="">

<!-- Nav -->
<header class="w-full top-0 z-50 bg-background/95 backdrop-blur border-b border-copper-bronze/30 sticky transition-shadow duration-300" id="site-header">
    <div class="flex flex-col items-center w-full px-6 md:px-12 py-3 max-w-7xl mx-auto">
        <div class="flex items-center justify-between w-full">
            <button aria-controls="mobile-nav" aria-expanded="false" aria-label="Open menu" class="md:hidden p-2 -ml-2 text-copper-bronze hover:opacity-70 transition-opacity duration-300" id="menu-toggle">
                <span class="material-symbols-outlined text-2xl">menu</span>
            </button>
            <a class="flex items-center gap-3 font-headline-md text-2xl md:text-headline-md text-copper-bronze uppercase tracking-widest transition-opacity duration-300 hover:opacity-80" href="index.html">
                <img alt="Lumina logo" class="w-16 h-16 md:w-20 md:h-20 object-contain" src="assets/img/lumina-logo.png?v=2" />
                <span class="hidden sm:inline">Lumina</span>
            </a>
            <div class="flex items-center gap-1 text-copper-bronze ml-auto" id="nav-auth-actions"></div>
        </div>
        <nav aria-label="Primary" class="hidden md:flex items-center justify-center gap-8 w-full pt-3 font-body-md text-body-md">
            <a class="nav-link text-on-surface-variant hover:text-copper-bronze transition-colors duration-300" href="index.html">Home</a>
            <a class="nav-link text-on-surface-variant hover:text-copper-bronze transition-colors duration-300" href="story.html">Our Story</a>
            <a class="nav-link text-on-surface-variant hover:text-copper-bronze transition-colors duration-300" href="wax.html">Soya Wax Education</a>
            <a class="nav-link text-on-surface-variant hover:text-copper-bronze transition-colors duration-300" href="shop.html">Shop</a>
            <a class="nav-link text-on-surface-variant hover:text-copper-bronze transition-colors duration-300" href="gallery.html">Gallery</a>
            <a class="nav-link text-on-surface-variant hover:text-copper-bronze transition-colors duration-300" href="contact.html">Contact</a>
        </nav>
    </div>
    <nav aria-label="Mobile" class="md:hidden w-full px-6 font-body-md text-body-md" id="mobile-nav">
        <div class="flex flex-col pb-4">
            <a class="py-3 border-b border-copper-bronze/10 text-on-surface-variant hover:text-copper-bronze" href="index.html">Home</a>
            <a class="py-3 border-b border-copper-bronze/10 text-on-surface-variant hover:text-copper-bronze" href="shop.html">Shop</a>
            <a class="py-3 border-b border-copper-bronze/10 text-on-surface-variant hover:text-copper-bronze" href="gallery.html">Gallery</a>
            <a class="py-3 border-b border-copper-bronze/10 text-on-surface-variant hover:text-copper-bronze" href="contact.html">Contact</a>
        </div>
    </nav>
</header>

<!-- Page — rendered by auth.js once user is confirmed -->
<main class="flex-grow max-w-2xl mx-auto w-full px-6 py-16" id="account-body">
    <!-- skeleton while loading -->
    <div class="animate-pulse space-y-4">
        <div class="h-8 bg-copper-bronze/10 rounded w-48"></div>
        <div class="h-4 bg-copper-bronze/10 rounded w-64"></div>
    </div>
</main>

<footer class="border-t border-copper-bronze/20 py-8 text-center font-label-caps text-label-caps text-on-surface-variant/60 uppercase tracking-widest">
    © 2025 Lumina. All rights reserved.
</footer>

</body>
</html>
