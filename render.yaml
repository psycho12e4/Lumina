# Render Blueprint for Lumina — deploy with "New > Blueprint" and point it at this repo.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: lumina
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: LUMINA_ADMIN_PASSWORD
        sync: false # set your own value in the Render dashboard
      - key: LUMINA_DATA_DIR
        value: /data
    disk:
      name: lumina-data
      mountPath: /data
      sizeGB: 1
